name: Sardine
options:
  bundleIdPrefix: com.futeng
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  MARKETING_VERSION: "0.1.0"
  CURRENT_PROJECT_VERSION: "1"
  SWIFT_VERSION: "5.10"
targets:
  Sardine:
    type: application
    platform: iOS
    sources:
      - Sardine
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.futeng.sardine
      PRODUCT_NAME: Sardine
      INFOPLIST_FILE: Sardine/Supporting/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Sardine/Supporting/Info.plist
    scheme:
      testTargets:
        - SardineTests
  SardineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SardineTests
    dependencies:
      - target: Sardine
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.futeng.sardine.tests

