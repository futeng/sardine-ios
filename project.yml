name: Sardine
options:
  bundleIdPrefix: com.futeng
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  MARKETING_VERSION: "0.1.0"
  CURRENT_PROJECT_VERSION: "1"
  SWIFT_VERSION: "5.10"
targets:
  Sardine:
    type: application
    platform: iOS
    sources:
      - path: Sardine
    resources:
      - Sardine/Assets.xcassets
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.futeng.sardine
      PRODUCT_NAME: Sardine
      INFOPLIST_FILE: Sardine/Supporting/Info.plist
      TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Sardine/Supporting/Info.plist
      properties:
        CFBundleDisplayName: 沙丁鱼
        UILaunchScreen: {}
        NSPhotoLibraryUsageDescription: 用于选择需要压缩的作业视频。
        NSPhotoLibraryAddUsageDescription: 用于把压缩后的视频保存到相册。
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    scheme:
      testTargets:
        - SardineTests
  SardineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SardineTests
    dependencies:
      - target: Sardine
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.futeng.sardine.tests
      GENERATE_INFOPLIST_FILE: YES
